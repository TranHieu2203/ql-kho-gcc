# ql-kho-gcc — production deploy (image từ Docker Hub)
#
# Cách dùng:
#   1. mkdir -p /opt/ql-kho-gcc && cd /opt/ql-kho-gcc
#   2. curl -fsSL https://raw.githubusercontent.com/TranHieu2203/ql-kho-gcc/main/docker-compose.yml -o docker-compose.yml
#      curl -fsSL https://raw.githubusercontent.com/TranHieu2203/ql-kho-gcc/main/.env.example       -o .env.example
#   3. cp .env.example .env && nano .env
#        - ADMIN_INITIAL_PASSWORD: password admin lần đầu
#        - CRON_SECRET: token cho backup cron (sinh: openssl rand -hex 24)
#        - NPM_NETWORK: tên Docker network của Nginx Proxy Manager
#          (xem: docker inspect <npm-container> -f '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}')
#          Để mặc định `bridge` nếu KHÔNG dùng NPM trong Docker.
#   4. docker compose pull && docker compose up -d
#   5. Cấu hình NPM proxy host:
#        - Forward Hostname: ql-kho-app
#        - Forward Port: 3000
#        - Scheme: http (NPM termina SSL bằng Let's Encrypt)
#
# Image: https://hub.docker.com/r/hieutech2203/ql-kho-gcc

services:
  app:
    image: hieutech2203/ql-kho-gcc:latest
    container_name: ql-kho-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Timezone — default Asia/Ho_Chi_Minh (UTC+7). Override nếu cần.
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      DATABASE_URL: file:/app/data/app.db
      ENABLE_HSTS: "1"
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Quản trị viên}
      CRON_SECRET: ${CRON_SECRET:-}
    volumes:
      - ./data:/app/data
    networks:
      - default     # internal network của project (cho healthcheck nội bộ)
      - proxy       # network chia sẻ với reverse proxy (NPM/Traefik/nginx)
    ports:
      # Bind loopback only — chỉ reverse proxy trên CÙNG host gọi được.
      # Có thể bỏ block này nếu chỉ dùng Docker DNS qua network proxy.
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  default:
    name: ql-kho_default
  proxy:
    # Network bên ngoài (đã tồn tại) để chia sẻ với reverse proxy container.
    # Mặc định `bridge` (Docker tự có) — an toàn cho user KHÔNG dùng NPM Docker.
    # User dùng NPM Docker: set NPM_NETWORK=<tên-network-NPM> trong .env.
    external: true
    name: ${NPM_NETWORK:-bridge}
