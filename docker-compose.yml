# ql-kho-gcc — production deploy (image từ Docker Hub)
#
# Cách dùng trên server production:
#   1. Tạo thư mục: mkdir -p /opt/ql-kho-gcc && cd /opt/ql-kho-gcc
#   2. Copy 3 file từ repo về: docker-compose.yml + Caddyfile + .env.example
#      (KHÔNG cần clone source code)
#   3. cp .env.example .env và điền DOMAIN, ADMIN_INITIAL_PASSWORD, ACME_EMAIL, CRON_SECRET
#   4. docker compose pull && docker compose up -d
#   5. Theo dõi: docker compose logs -f
#
# Update phiên bản mới: docker compose pull && docker compose up -d
#
# Image: https://hub.docker.com/r/hieutech2203/ql-kho-gcc
#
# Backup SQLite:
#   docker compose exec app sh -c "sqlite3 /app/data/app.db .dump" > backup-$(date +%F).sql
#   Hoặc: copy ./data/app.db ra ngoài (cẩn thận khi app đang chạy → dùng .backup)

services:
  app:
    # Image pre-built từ Docker Hub — KHÔNG build local
    # Đổi tag :latest → :v1.0.0 (hoặc version cụ thể) để pin phiên bản
    image: hieutech2203/ql-kho-gcc:latest
    container_name: ql-kho-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # SQLite ở volume mount — persist qua restart/rebuild
      DATABASE_URL: file:/app/data/app.db
      # Bật HSTS khi đã HTTPS (Caddy auto cấp Let's Encrypt)
      ENABLE_HSTS: "1"
      # Lần chạy đầu: set qua .env. Sau khi admin đã được tạo, xoá đi.
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Quản trị viên}
      # Token cho /api/cron/backup (>= 16 ký tự). Bỏ trống → endpoint trả 503.
      CRON_SECRET: ${CRON_SECRET:-}
    volumes:
      - ./data:/app/data
    networks:
      - kho-net
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    container_name: ql-kho-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - kho-net

volumes:
  caddy_data:
  caddy_config:

networks:
  kho-net:
    driver: bridge
